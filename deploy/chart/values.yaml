## kedge-kuery-provider values
## Phase 1 skeleton: the provider serves a micro-frontend and a small
## backend HTTP API, heartbeats the hub, and owns the SavedView APIExport.
## Phase 2 adds the embedded kuery engine (edge informer sync into a local
## store) — at which point this chart grows a PVC and the replica count
## becomes fixed at 1 (SQLite store).

# Container image. Build with: docker build -t IMAGE providers/kuery/
image:
  repository: ghcr.io/faroshq/kedge-kuery-provider
  tag: ""  # empty → defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent

# Number of Deployment replicas. Phase 1 is stateless; Phase 2 introduces
# the local store, which pins this to 1.
replicaCount: 1

service:
  type: ClusterIP
  port: 8081

# Hub the provider POSTs heartbeats to. Must be reachable from the provider
# pod (in-cluster Service DNS works). Empty url → heartbeats disabled, which
# is fine for a UI-only demo install.
hub:
  url: https://kedge-hub.kedge.svc.cluster.local:9443
  # Bearer token used in the heartbeat POST. Provided as a Secret because it
  # MUST NOT land in values.yaml in plaintext for prod. Leave name empty to
  # send unauthenticated heartbeats (dev only).
  tokenSecretRef:
    name: ""
    key: token
  # Skip TLS verification on heartbeat — dev only, defaults off.
  insecure: false

# Embedded kuery store. SQLite-on-PVC is the default; for production scale
# switch driver to postgres, set dsn to the connection string, and disable
# persistence.
store:
  driver: sqlite
  dsn: /data/kuery.db
  persistence:
    enabled: true
    size: 5Gi
    storageClassName: ""  # empty → cluster default

# Edge sync resource selection, comma-separated "resource.group" entries
# (empty group = core).
#
# whitelist: ONLY these resources sync; everything else stays discoverable
# (kind resolution works) but ships no objects. Edge links are often
# bandwidth-constrained, so the default is the workloads/config/RBAC/
# networking set rather than everything. Set to "" to sync everything
# watchable.
# blacklist: skipped entirely, on top of the whitelist. Empty uses kuery's
# defaults: secrets and events.
sync:
  whitelist: >-
    pods,services,endpoints,configmaps,namespaces,nodes,
    persistentvolumeclaims,persistentvolumes,serviceaccounts,
    limitranges,resourcequotas,
    deployments.apps,replicasets.apps,statefulsets.apps,daemonsets.apps,
    jobs.batch,cronjobs.batch,
    ingresses.networking.k8s.io,networkpolicies.networking.k8s.io,
    roles.rbac.authorization.k8s.io,rolebindings.rbac.authorization.k8s.io,
    clusterroles.rbac.authorization.k8s.io,clusterrolebindings.rbac.authorization.k8s.io,
    storageclasses.storage.k8s.io,
    customresourcedefinitions.apiextensions.k8s.io,
    horizontalpodautoscalers.autoscaling
  blacklist: ""

# When true, the chart also renders the CatalogEntry that registers the
# provider with the hub. Set to false to manage the CatalogEntry separately
# (e.g. via GitOps with a different rollout cadence than the workload).
catalogEntry:
  enabled: true

# Secret holding the workspace-admin kubeconfig minted via /bonkers (admin
# onboarding). Consumed by both the init container and serve. Key "kubeconfig".
providerKubeconfig:
  secretName: kedge-provider-kubeconfig

# APIExport bootstrap (applied by the init container).
apiExport:
  # REQUIRED for kuery: the identityHash of the root edges.kedge.faros.sh
  # APIExport. Copy it from the /bonkers "Root identities" view. Without it,
  # tenant Enable accepts the edges claim but the controller engages zero edges.
  edgesIdentityHash: ""

serviceAccount:
  create: true
  name: ""   # empty → release-name

# The sync engine holds informer caches for every engaged edge — size for
# the fleet, not for an idle web server.
resources:
  limits:
    cpu: "1"
    memory: 1Gi
  requests:
    cpu: 100m
    memory: 256Mi

# Optional pod-level overrides.
podLabels: {}
podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}
