apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kuery.fullname" . }}
  labels:
    {{- include "kuery.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "kuery.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kuery.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "kuery.serviceAccountName" . }}
      initContainers:
        # Bootstrap the provider workspace (schemas, APIExport, slice, bind
        # grant) with the onboarded workspace-admin kubeconfig. kuery's edges
        # permission claim is first-party, so its identityHash MUST be supplied
        # (copy it from the /bonkers "Root identities" view into
        # apiExport.edgesIdentityHash) or tenant Enable engages zero edges.
        - name: init
          image: "{{ .Values.image.repository }}:{{ default .Chart.AppVersion .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["init"]
          env:
            - name: KEDGE_PROVIDER_KUBECONFIG
              value: /var/run/secrets/kedge/kedge-provider-kubeconfig
            - name: KEDGE_SCHEMAS_DIR
              value: /etc/kedge/schemas
            - name: KUERY_EDGES_IDENTITY_HASH
              value: {{ .Values.apiExport.edgesIdentityHash | quote }}
          volumeMounts:
            - name: kedge-provider-kubeconfig
              mountPath: /var/run/secrets/kedge
              readOnly: true
      containers:
        - name: provider
          image: "{{ .Values.image.repository }}:{{ default .Chart.AppVersion .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 20
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            periodSeconds: 5
          env:
            - name: PORT
              value: "8081"
            - name: KEDGE_HUB_URL
              value: {{ .Values.hub.url | quote }}
            - name: KEDGE_PROVIDER_NAME
              value: "kuery"
            - name: KEDGE_PROVIDER_KUBECONFIG
              value: /var/run/secrets/kedge/kedge-provider-kubeconfig
            - name: KUERY_STORE_DRIVER
              value: {{ .Values.store.driver | quote }}
            - name: KUERY_STORE_DSN
              value: {{ .Values.store.dsn | quote }}
            {{- if .Values.sync.whitelist }}
            - name: KUERY_SYNC_WHITELIST
              # Collapse the folded-block whitespace into the clean
              # comma-separated form the binary parses.
              value: {{ .Values.sync.whitelist | replace " " "" | replace "\n" "" | quote }}
            {{- end }}
            {{- if .Values.sync.blacklist }}
            - name: KUERY_SYNC_BLACKLIST
              value: {{ .Values.sync.blacklist | quote }}
            {{- end }}
            {{- if .Values.hub.insecure }}
            - name: KEDGE_HUB_INSECURE
              value: "true"
            {{- end }}
            {{- if .Values.hub.tokenSecretRef.name }}
            - name: KEDGE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.hub.tokenSecretRef.name }}
                  key: {{ .Values.hub.tokenSecretRef.key }}
            {{- end }}
          volumeMounts:
            # The onboarded workspace-admin kubeconfig; the SA token inside is
            # what the Enable-time edges-proxy grant authorizes for background
            # edge sync.
            - name: kedge-provider-kubeconfig
              mountPath: /var/run/secrets/kedge
              readOnly: true
            - name: store
              mountPath: /data
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        # Required input: the workspace-admin kubeconfig minted via /bonkers
        # (admin onboarding), consumed by both init and serve. The onboard
        # response stores it under key "kubeconfig".
        - name: kedge-provider-kubeconfig
          secret:
            secretName: {{ .Values.providerKubeconfig.secretName }}
            items:
              - key: kubeconfig
                path: kedge-provider-kubeconfig
        - name: store
          {{- if .Values.store.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "kuery.fullname" . }}-store
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
