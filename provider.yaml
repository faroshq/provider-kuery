# Provider — declarative provisioning record (admin.kedge.faros.sh, admin-only).
# The hub's Provider controller creates root:kedge:providers:kuery, its
# "provider" ServiceAccount, and the kuery-kubeconfig Secret in
# root:kedge:system:providers. The APIExport/schemas/bind-grant come from kuery's own
# `init`; routing/UI from the companion CatalogEntry in manifest.yaml.
apiVersion: admin.kedge.faros.sh/v1alpha1
kind: Provider
metadata:
  name: kuery
spec:
  displayName: "Kuery"
